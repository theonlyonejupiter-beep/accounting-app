<!DOCTYPE html>
<html>
<head>
    <title>生成PWA图标</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f7fa; }
        .icon-preview { display: inline-block; margin: 10px; text-align: center; }
        canvas { border: 1px solid #ddd; border-radius: 10px; }
        .btn { display: inline-block; padding: 10px 20px; margin: 5px; background: #6366f1; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .btn:hover { background: #4f46e5; }
        h1 { color: #6366f1; }
    </style>
</head>
<body>
    <h1>PWA图标生成器</h1>
    <p>点击下方按钮保存各尺寸图标：</p>

    <div class="icon-preview">
        <canvas id="canvas192" width="192" height="192"></canvas>
        <br>
        <button class="btn" onclick="downloadIcon('canvas192', 'icon-192x192.png')">保存 192x192</button>
    </div>

    <div class="icon-preview">
        <canvas id="canvas512" width="512" height="512"></canvas>
        <br>
        <button class="btn" onclick="downloadIcon('canvas512', 'icon-512x512.png')">保存 512x512</button>
    </div>

    <div class="icon-preview">
        <canvas id="canvas180" width="180" height="180"></canvas>
        <br>
        <button class="btn" onclick="downloadIcon('canvas180', 'apple-touch-icon.png')">保存 apple-touch-icon</button>
    </div>

    <script>
        function drawIcon(canvas) {
            const ctx = canvas.getContext('2d');
            const size = canvas.width;
            const scale = size / 512;

            // 背景渐变
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#667eea');
            gradient.addColorStop(0.5, '#764ba2');
            gradient.addColorStop(1, '#f093fb');

            // 绘制圆角矩形背景
            const radius = 120 * scale;
            ctx.beginPath();
            ctx.moveTo(radius, 0);
            ctx.lineTo(size - radius, 0);
            ctx.quadraticCurveTo(size, 0, size, radius);
            ctx.lineTo(size, size - radius);
            ctx.quadraticCurveTo(size, size, size - radius, size);
            ctx.lineTo(radius, size);
            ctx.quadraticCurveTo(0, size, 0, size - radius);
            ctx.lineTo(0, radius);
            ctx.quadraticCurveTo(0, 0, radius, 0);
            ctx.closePath();
            ctx.fillStyle = gradient;
            ctx.fill();

            // 高光层
            const highlightGradient = ctx.createLinearGradient(0, 0, size, size);
            highlightGradient.addColorStop(0, 'rgba(255, 255, 255, 0.4)');
            highlightGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.fillStyle = highlightGradient;
            ctx.fillRect(0, 0, size, size / 2);

            // 钱袋主体
            const centerX = size / 2;
            const centerY = size / 2 + 20 * scale;
            const bagRadiusX = 130 * scale;
            const bagRadiusY = 120 * scale;

            ctx.beginPath();
            ctx.ellipse(centerX, centerY, bagRadiusX, bagRadiusY, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
            ctx.fill();

            // 钱袋开口
            const openWidth = 100 * scale;
            const openHeight = 60 * scale;
            const openY = centerY - 120 * scale;
            ctx.beginPath();
            ctx.roundRect(centerX - openWidth, openY, openWidth * 2, openHeight, 30 * scale);
            ctx.fillStyle = gradient;
            ctx.fill();

            // 钱袋装饰线
            ctx.beginPath();
            ctx.moveTo(centerX - 60 * scale, openY + 30 * scale);
            ctx.lineTo(centerX + 60 * scale, openY + 30 * scale);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 4 * scale;
            ctx.lineCap = 'round';
            ctx.stroke();

            // 钱袋绳结
            ctx.beginPath();
            ctx.arc(centerX, openY, 15 * scale, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(centerX, openY, 8 * scale, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();

            // ¥ 符号
            ctx.fillStyle = 'white';
            ctx.font = `bold ${100 * scale}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('¥', centerX, centerY + 30 * scale);

            // 装饰元素
            ctx.beginPath();
            ctx.arc(120 * scale, 120 * scale, 20 * scale, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(392 * scale, 120 * scale, 15 * scale, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(150 * scale, 400 * scale, 12 * scale, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.fill();

            // 高光点
            ctx.beginPath();
            ctx.arc(200 * scale, 200 * scale, 8 * scale, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(320 * scale, 180 * scale, 5 * scale, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.fill();
        }

        function downloadIcon(canvasId, filename) {
            const canvas = document.getElementById(canvasId);
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // 绘制所有图标
        drawIcon(document.getElementById('canvas192'));
        drawIcon(document.getElementById('canvas512'));
        drawIcon(document.getElementById('canvas180'));
    </script>
</body>
</html>
