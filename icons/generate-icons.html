<!DOCTYPE html>
<html>
<head>
    <title>生成PWA图标</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f7fa; }
        .icon-preview { display: inline-block; margin: 10px; text-align: center; }
        canvas { border: 1px solid #ddd; border-radius: 10px; }
        .btn { display: inline-block; padding: 10px 20px; margin: 5px; background: #6366f1; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .btn:hover { background: #4f46e5; }
        h1 { color: #6366f1; }
    </style>
</head>
<body>
    <h1>PWA图标生成器</h1>
    <p>点击下方按钮保存各尺寸图标：</p>

    <div class="icon-preview">
        <canvas id="canvas192" width="192" height="192"></canvas>
        <br>
        <button class="btn" onclick="downloadIcon('canvas192', 'icon-192x192.png')">保存 192x192</button>
    </div>

    <div class="icon-preview">
        <canvas id="canvas512" width="512" height="512"></canvas>
        <br>
        <button class="btn" onclick="downloadIcon('canvas512', 'icon-512x512.png')">保存 512x512</button>
    </div>

    <div class="icon-preview">
        <canvas id="canvas180" width="180" height="180"></canvas>
        <br>
        <button class="btn" onclick="downloadIcon('canvas180', 'apple-touch-icon.png')">保存 apple-touch-icon</button>
    </div>

    <script>
        function drawIcon(canvas) {
            const ctx = canvas.getContext('2d');
            const size = canvas.width;
            const scale = size / 512;

            // 背景渐变
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#667eea');
            gradient.addColorStop(1, '#764ba2');

            // 绘制圆角矩形背景
            const radius = 100 * scale;
            ctx.beginPath();
            ctx.moveTo(radius, 0);
            ctx.lineTo(size - radius, 0);
            ctx.quadraticCurveTo(size, 0, size, radius);
            ctx.lineTo(size, size - radius);
            ctx.quadraticCurveTo(size, size, size - radius, size);
            ctx.lineTo(radius, size);
            ctx.quadraticCurveTo(0, size, 0, size - radius);
            ctx.lineTo(0, radius);
            ctx.quadraticCurveTo(0, 0, radius, 0);
            ctx.closePath();
            ctx.fillStyle = gradient;
            ctx.fill();

            // 钱袋主体
            ctx.beginPath();
            const centerX = size / 2;
            const centerY = size / 2;
            const bagRadius = 140 * scale;
            ctx.arc(centerX, centerY - 20 * scale, bagRadius, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
            ctx.fill();

            // 钱袋开口
            const openWidth = 130 * scale;
            const openHeight = 60 * scale;
            const openY = centerY - 70 * scale;
            ctx.beginPath();
            ctx.roundRect(centerX - openWidth, openY - openHeight/2, openWidth * 2, openHeight, 10 * scale);
            ctx.fillStyle = gradient;
            ctx.fill();

            // ¥ 符号
            ctx.fillStyle = 'white';
            ctx.font = `bold ${120 * scale}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('¥', centerX, centerY + 30 * scale);
        }

        function downloadIcon(canvasId, filename) {
            const canvas = document.getElementById(canvasId);
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // 绘制所有图标
        drawIcon(document.getElementById('canvas192'));
        drawIcon(document.getElementById('canvas512'));
        drawIcon(document.getElementById('canvas180'));
    </script>
</body>
</html>
