<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 主渐变 -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>
    <!-- 高光渐变 -->
    <linearGradient id="highlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.4);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0);stop-opacity:1" />
    </linearGradient>
    <!-- 阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
    <!-- 内阴影 -->
    <filter id="innerShadow">
      <feOffset dx="0" dy="4"/>
      <feGaussianBlur stdDeviation="4"/>
      <feComposite operator="out" in="SourceGraphic"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>
  </defs>
  <!-- 背景圆角矩形 -->
  <rect width="512" height="512" rx="120" fill="url(#mainGrad)" filter="url(#shadow)"/>
  <!-- 高光层 -->
  <rect width="512" height="256" rx="120" fill="url(#highlight)" opacity="0.5"/>
  <!-- 钱袋主体 -->
  <g transform="translate(256, 280)">
    <!-- 钱袋身体 -->
    <ellipse cx="0" cy="0" rx="130" ry="120" fill="white" opacity="0.95"/>
    <!-- 钱袋开口 -->
    <rect x="-100" y="-120" width="200" height="60" rx="30" fill="url(#mainGrad)"/>
    <!-- 钱袋装饰线 -->
    <line x1="-60" y1="-90" x2="60" y2="-90" stroke="rgba(255,255,255,0.5)" stroke-width="4" stroke-linecap="round"/>
    <!-- 钱袋绳结 -->
    <circle cx="0" cy="-120" r="15" fill="white" opacity="0.9"/>
    <circle cx="0" cy="-120" r="8" fill="url(#mainGrad)"/>
  </g>
  <!-- ¥ 符号 -->
  <text x="256" y="310" font-family="Arial, sans-serif" font-size="100" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle" filter="url(#innerShadow)">¥</text>
  <!-- 装饰元素 -->
  <circle cx="120" cy="120" r="20" fill="rgba(255,255,255,0.2)"/>
  <circle cx="392" cy="120" r="15" fill="rgba(255,255,255,0.15)"/>
  <circle cx="150" cy="400" r="12" fill="rgba(255,255,255,0.1)"/>
  <!-- 高光点 -->
  <circle cx="200" cy="200" r="8" fill="rgba(255,255,255,0.6)"/>
  <circle cx="320" cy="180" r="5" fill="rgba(255,255,255,0.4)"/>
</svg>